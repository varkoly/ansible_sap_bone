---
# tasks file for sap_hana_bone_prepare
- name: 1. Ensure required prerequisite packages are installed
  ansible.builtin.package:
    name:
      - lvm2                # required for the installation
      - unzip               # required for the installation
      - libatomic1          # required for HANA
      - libgcc_s1           # required for HANA
      - libstdc++6          # required for HANA
      - libltdl7            # required for HANA
      - saptune             # required for HANA
    state: present
    update_cache: yes # Ensure package manager cache is updated before installing

- name: 2. Ensure /etc/sysctl.conf file exists and has correct ownership
  ansible.builtin.file:
    path: /etc/sysctl.conf
    state: touch      # 'touch' creates the file if it doesn't exist
    owner: root       # Sets the owner to root
    group: root       # Sets the group to root
    mode: '0644'      # Sets permissions (read/write for owner, read for group/others)

- name: 3. Ensure /etc/init.d directory exists and has correct ownership
  ansible.builtin.file:
    path: /etc/init.d
    state: directory  # Ensures the path exists as a directory
    owner: root
    group: root
    mode: '0755'      # Standard permissions for system directories (rwxr-xr-x)

- name: 4. Ensure "{{ sap_hana_install_software_directory }}" directory exists and has correct ownership
  ansible.builtin.file:
    path: "{{ sap_hana_install_software_directory }}"
    state: directory  # Ensures the path exists as a directory
    owner: root
    group: root
    mode: '0755'      # Standard permissions for system directories (rwxr-xr-x)

- name: 4.1 Ensure "{{ sap_hana_install_software_extract_directory }}" directory exists and has correct ownership
  ansible.builtin.file:
    path: "{{ sap_hana_install_software_extract_directory }}"
    state: directory  # Ensures the path exists as a directory
    owner: root
    group: root
    mode: '0755'      # Standard permissions for system directories (rwxr-xr-x)

- name: 5. Ensure "{{ sap_bone_install_software_directory }}" directory exists and has correct ownership
  ansible.builtin.file:
    path: "{{ sap_bone_install_software_directory }}"
    state: directory  # Ensures the path exists as a directory
    owner: root
    group: root
    mode: '0755'      # Standard permissions for system directories (rwxr-xr-x)

- name: 5.1 Ensure "{{ sap_bone_install_software_extract_directory }}" directory exists and has correct ownership
  ansible.builtin.file:
    path: "{{ sap_bone_install_software_extract_directory }}"
    state: directory  # Ensures the path exists as a directory
    owner: root
    group: root
    mode: '0755'      # Standard permissions for system directories (rwxr-xr-x)

- name: 6. Validate SAP HANA System ID - 'sap_hana_install_sid' is not in the list of reserved SAP SIDs
  ansible.builtin.assert:
    that: sap_hana_install_sid not in __sap_hana_install_sid_prohibited
    success_msg: |
      PASS: The SAP HANA System ID '{{ sap_hana_install_sid }}' is not in the list of reserved SAP SIDs in SAP note 1979280 v.20.
    fail_msg: |
      FAIL: The SAP HANA System ID '{{ sap_hana_install_sid }}' is in the list of reserved SAP SIDs in SAP note 1979280 v.20!

- name: 7. Create a temporary directory
  ansible.builtin.tempfile:
    state: directory
    suffix: _build
  register: __temp_folder_info

- name: 7.1 Use the temporary directory path
  ansible.builtin.set_fact:
    __sap_install_temp_dir: "{{ __temp_folder_info.path }}"

- name: 7.2 Set specific permissions on the temp directory
  ansible.builtin.file:
    path: "{{ __sap_install_temp_dir }}"
    mode: '0700'
    owner: "root"
    group: "root"
  become: yes

- name: 7.3 Create HANA parameters file
  ansible.builtin.template:
    src: "templates/hana_install.cfg.j2"
    dest: "{{ __sap_install_temp_dir }}/hana_install.cfg"
    owner: 'root'
    group: 'root'
    mode: '0600'

#- name: 7.3 Create HANA password file
#  ansible.builtin.template:
#    src: "templates/pwd.xml.j2"
#    dest: "{{ __sap_install_temp_dir }}/pwd.xml"
#    owner: 'root'
#    group: 'root'
#    mode: '0600'

- name: 7.4 Create Business One parameters file
  ansible.builtin.template:
    src: "templates/b1h_properties.j2"
    dest: "{{ __sap_install_temp_dir }}/b1h_properties"
    owner: 'root'
    group: 'root'
    mode: '0600'

- name: 8 Saptune Configuration Block
  block:
    - name: Check currently enabled saptune solution
      ansible.builtin.command: saptune solution enabled
      register: __saptune_check
      # We don't want this to show as "changed" since it's just a query
      changed_when: false
      # Prevent failure if no solution is currently enabled
      failed_when: false

    - name: Revert and Apply HANA Solution
      # We use shell here to handle the subshell $(...) syntax
      ansible.builtin.shell: |
        saptune solution revert {{ __saptune_check.stdout | trim }}
        saptune solution apply HANA
      # ONLY run this if "HANA" is NOT found in the check output
      when: "'HANA' not in __saptune_check.stdout"
      async: 600  # Saptune can sometimes be slow
      poll: 10
      register: saptune_apply_result

    - name: Ensure saptune service is enabled
      ansible.builtin.command: saptune service enable
      # This is usually fast, so no async needed
      register: service_result
      # Only show changed if it wasn't already enabled
      changed_when: "'already enabled' not in service_result.stdout"

  rescue:
    - name: Report Saptune failure
      ansible.builtin.debug:
        msg: "Saptune configuration failed. Check the logs below."

  always:
    - name: Final Saptune Status
      ansible.builtin.command: saptune solution verify
      register: final_verify
      changed_when: false

    - name: Display Verification Output
      ansible.builtin.debug:
        var: final_verify.stdout_lines

- name: Report config files
  ansible.builtin.debug:
    msg: "You can find the config files in {{ __sap_install_temp_dir }}"
